<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revello Stefano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Mona+Sans:wght@300;400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
  <script defer type="text/javascript" src="index.js">	 </script>
</head>

<body>
  <nav>
    <a class="nav-logo" href="index.html">Revello Stefano<span>.</span></a>
    <ul class="nav-links">
      <li><a href="competenze.html">Competenze</a></li>
      <li><a href="contatti.html">Contatti</a></li>
    </ul>
  </nav>
  <main>
    <div class="wrapper">
      <!-- BUTTON 1 -->
      <div class="text-light titolo">Linguaggi</div>
      <div class="container btn-linguaggi">
        <div class="row">
          <div class="col">
            <button type="button" class="btn btn-bd-primary bottoni" id="c-btn">
              <div class="img-div max-img-div exagon-img-div" id="c-logo"></div>
            </button>
          </div>
          <div class="col text-center">
            <button type="button" class="btn btn-bd-primary bottoni" id="cs-btn">
              <div class="img-div max-img-div big-logo exagon-img-div" id="cs-logo"></div>
            </button>
          </div>
          <div class="col text-end">
            <button type="button" class="btn btn-bd-primary bottoni" id="bs-btn" >
              <div class="img-div max-img-div big-logo exagon-img-div" id="bs-logo"></div>
            </button>
          </div>
        </div>
        <div class="row">
          <div class="col">
            <button type="button" class="btn btn-bd-primary bottoni" id="html-btn">
              <div class="img-div max-img-div" id="html-logo"></div>
            </button>
          </div>
          <div class="col text-center">
            <button type="button" class="btn btn-bd-primary bottoni" id="css-btn">
              <div class="img-div max-img-div" id="css-logo"></div>
            </button>
          </div>
          <div class="col text-end">
            <button type="button" class="btn btn-bd-primary p-3 bottoni" id="js-btn">
              <div class="img-div max-img-div quad-img-div" id="js-logo"></div>
            </button>
          </div>
        </div>
      </div>
      <br><br><br>
      <div class="text-light titolo">Certificazioni</div>
      <div class="container btn-linguaggi btn-certificazioni">
        <div class="row">
          <div class="col">
            <div class="bottone-cert">
              <button type="button" class="btn btn-bd-primary bottoni" id="cambridge-btn">
                <div class="img-div max-img-div" id="cambridge-logo"></div>
                <p class="bottone-cert-label">Certificato B1 Inglese</p>
              </button>
            </div>
          </div>
        </div>
      </div>
  </main>
</body>

</html>
